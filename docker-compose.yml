version: '3.8'

services:
  # MongoDB Service
  mongo:
    image: mongo:latest
    container_name: genetic-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - genetic-network

  # ML API Service
  ml-api:
    build: ./ml-api
    container_name: genetic-ml-api
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - FLASK_DEBUG=0
    networks:
      - genetic-network

  # Backend Service
  backend:
    build: ./backend
    container_name: genetic-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/genetic_guard
      - JWT_SECRET=change_this_secret_in_production
      - ML_SERVICE_URL=http://ml-api:5001/predict
      - CLIENT_URL=http://localhost:8080
      - ENABLE_MEMORY_DB=false
    depends_on:
      - mongo
      - ml-api
    networks:
      - genetic-network

  # Frontend Service
  frontend:
    build: ./frontend
    container_name: genetic-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - genetic-network

networks:
  genetic-network:
    driver: bridge

volumes:
  mongo-data:
